<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Lab</title>

    <link rel="stylesheet" href="style.css">

    <!-- GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
</head>

<body>

    <!-- Hareketli Arka Plan -->
    <canvas id="background"></canvas>

    <!-- Sis Efekti -->
    <div id="fog"></div>

    <!-- Açılış Ekranı -->
    <section id="intro">

        <h1 id="logo">FOOD LAB</h1>

        <div id="terminal">

            <p class="line">Initializing Laboratory...</p>
            <p class="line">Loading AI System...</p>
            <p class="line">Scanning Environment...</p>
            <p class="line">Experiment Ready.</p>

        </div>

        <button id="startBtn">
            START EXPERIMENT
        </button>

    </section>

    <!-- Deney Alanı -->
    <section id="labScene" class="hidden">

        <!-- Enerji Halkaları -->
        <div id="scanner">

            <div class="ring ring1"></div>
            <div class="ring ring2"></div>
            <div class="ring ring3"></div>

        </div>

        <!-- Deney Tabağı -->
        <div id="plate"></div>

        <!-- Portal -->
        <div id="portal"></div>

        <!-- Parçacıklar -->
        <canvas id="particles"></canvas>

        <!-- Fotoğraf -->
        <img id="dishPhoto" src="" alt="Food">

        <!-- AI Analiz Paneli -->
        <div id="analysis">

            <h2>AI ANALYSIS</h2>

            <p id="analysisText"></p>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
